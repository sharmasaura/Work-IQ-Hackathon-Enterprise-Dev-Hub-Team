<details class="panel-card" open>
    <summary>📊 DASHBOARD</summary>
    <div class="panel-content">
        <div class="dashboard-filter-row" style="display: grid; grid-template-columns: 1fr 1fr auto; gap: 8px; margin-bottom: 12px;">
            <div class="panel-form-row" style="margin: 0;">
                <label for="dashboardStartDate">Start Date</label>
                <input type="date" id="dashboardStartDate" class="panel-input">
            </div>
            <div class="panel-form-row" style="margin: 0;">
                <label for="dashboardEndDate">End Date</label>
                <input type="date" id="dashboardEndDate" class="panel-input">
            </div>
            <div style="display: flex; align-items: end; gap: 8px;">
                <button type="button" id="applyDashboardFilterBtn" class="filter-btn-sm" style="width: 100%;">Apply</button>
            </div>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <div>
                <div style="font-size: 11px; font-weight: 700; color: #344486; text-transform: uppercase; letter-spacing: 0.3px;">Range</div>
                <div id="dashboardRangeLabel" style="font-size: 12px; color: #666;">All dates</div>
            </div>
            <div id="dashboardStatus" style="font-size: 12px; font-weight: 700; color: #4a58c6;">Loading...</div>
        </div>

        <div id="dashboardSummary" style="display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; margin-bottom: 14px;"></div>

        <div style="font-size: 11px; font-weight: 700; color: #344486; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.3px;">Overall source matrix</div>
        <div id="dashboardMatrix" style="display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px;"></div>
    </div>
</details>
